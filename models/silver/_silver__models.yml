version: 2

models:
  - name: slv_meetings
    description: "Cleaned, conformed meetings: status labels, normalized host, casts, dedup."
    columns:
      - name: meeting_id
        description: "Unique meeting identifier."
        data_tests: [not_null, unique]
      - name: account_id
        data_tests: [not_null]
      - name: meeting_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['scheduled', 'started', 'ended', 'cancelled', 'unknown']

  - name: slv_participants
    description: "De-duplicated participant attendance with clamped talk-time."
    columns:
      - name: participant_id
        data_tests: [not_null]
      - name: attended_minutes
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [meeting_id, participant_id]

  - name: slv_accounts
    description: "Cleaned accounts: plan tier labels, normalized region, age metric."
    columns:
      - name: account_id
        data_tests: [not_null, unique]
      - name: plan_tier
        data_tests:
          - accepted_values:
              arguments:
                values: ['Basic', 'Pro', 'Business', 'Enterprise', 'unknown']

# ---------------------------------------------------------------------------
# Hand-written native unit tests with MOCKED input data. These pin the exact
# behaviour of the conditional logic, de-duplication, string transforms and
# edge cases -- the four categories the zoom-ttd grader scores.
# ---------------------------------------------------------------------------
unit_tests:
  - name: test_slv_meetings_status_dedup_and_casts
    description: "CASE status mapping, null-duration coalesce, dedup, string + flag."
    model: slv_meetings
    given:
      - input: ref('brz_meetings')
        rows:
          # ended meeting, mixed-case host + padded topic, long (>=60)
          - {meeting_id: 'M1', account_id: 'A1', host_email: 'Alice@ACME.com', topic: ' weekly sync ', status_code: 'E', start_time: '2026-01-05 09:00:00', duration_minutes: 60, invited_count: 8}
          # cancelled meeting with NULL duration -> coalesce 0, not long
          - {meeting_id: 'M2', account_id: 'A1', host_email: 'bob@b.com', topic: 'x', status_code: 'C', start_time: '2026-01-08 11:00:00', duration_minutes: , invited_count: 2}
          # unknown status code -> 'unknown'
          - {meeting_id: 'M3', account_id: 'A2', host_email: 'c@c.com', topic: 'y', status_code: 'Z', start_time: '2026-01-09 10:00:00', duration_minutes: 30, invited_count: 4}
          # duplicate raw row for M1 -> must be collapsed to a single row
          - {meeting_id: 'M1', account_id: 'A1', host_email: 'Alice@ACME.com', topic: ' weekly sync ', status_code: 'E', start_time: '2026-01-05 09:00:00', duration_minutes: 60, invited_count: 8}
    expect:
      rows:
        - {meeting_id: 'M1', meeting_status: 'ended', host_email: 'ALICE@ACME.COM', topic: 'Weekly Sync', duration_minutes: 60, is_long_meeting: true}
        - {meeting_id: 'M2', meeting_status: 'cancelled', host_email: 'BOB@B.COM', topic: 'X', duration_minutes: 0, is_long_meeting: false}
        - {meeting_id: 'M3', meeting_status: 'unknown', host_email: 'C@C.COM', topic: 'Y', duration_minutes: 30, is_long_meeting: false}

  - name: test_slv_participants_dedup_and_clamp
    description: "Keep earliest join per attendee; clamp clock-skew talk-time to 0; upper email."
    model: slv_participants
    given:
      - input: ref('brz_participants')
        rows:
          # duplicate join events -> keep earliest (09:02), 38 minutes
          - {meeting_id: 'M1', participant_id: 'P1', participant_email: 'greg@acme.com', join_time: '2026-01-05 09:02:00', leave_time: '2026-01-05 09:40:00'}
          - {meeting_id: 'M1', participant_id: 'P1', participant_email: 'greg@acme.com', join_time: '2026-01-05 09:05:00', leave_time: '2026-01-05 09:40:00'}
          # clock skew: leave precedes join -> clamp to 0
          - {meeting_id: 'M1', participant_id: 'P2', participant_email: 'Ken@Initech.com', join_time: '2026-01-05 09:10:00', leave_time: '2026-01-05 09:05:00'}
    expect:
      rows:
        - {meeting_id: 'M1', participant_id: 'P1', participant_email: 'GREG@ACME.COM', attended_minutes: 38}
        - {meeting_id: 'M1', participant_id: 'P2', participant_email: 'KEN@INITECH.COM', attended_minutes: 0}
